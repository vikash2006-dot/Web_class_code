<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form action="/register" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required>
    <br><br>

    <label>Email:</label>
    <input type="email" name="email" required>
    <br><br>

    <label>Phone:</label>
    <input type="text" name="phone" required>
    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
